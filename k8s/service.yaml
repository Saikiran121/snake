apiVersion: v1
kind: Service
metadata:
  name: snake-service
  labels:
    app: snake
  annotations:
    # Use the native 'in-tree' EKS controller for the NLB instead of third-party plugins
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    # Attach your corrected AWS ACM Certificate ARN here:
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:ap-south-1:742841095355:certificate/ca727fc8-a06e-47ce-8048-561340c5a72f"
    # Terminate TLS securely explicitly on port 443
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
    # Ensure raw TCP logic natively flows backend to the unencrypted pods
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"
spec:
  type: LoadBalancer
  selector:
    app: snake
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 4000
  - name: https
    protocol: TCP
    port: 443
    targetPort: 4000
